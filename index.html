<!DOCTYPE HTML>
<html>
	<head>
		<title>Nathan Tompkins</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<!--link rel="stylesheet" href="" /-->
        	<link href="https://fonts.googleapis.com/css?family=IBM+Plex+Mono:400,400i,700|Yellowtail" rel="stylesheet">
       		<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.7.2/css/brands.css" integrity="sha384-BKw0P+CQz9xmby+uplDwp82Py8x1xtYPK3ORn/ZSoe6Dk3ETP59WCDnX+fI1XCKK" crossorigin="anonymous">
		<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.7.2/css/fontawesome.css" integrity="sha384-iD1qS/uJjE9q9kecNUe9R4FRvcinAvTcPClTz7NI8RI5gUsJ+eaeJeblG1Ex0ieh" crossorigin="anonymous">
        <style type="text/css">
            /*
            $green: #4ecdc4;
            $red: #ff6b6b;
            $blue: #556270;
            $light-blue: #798899;
            $dark-blue: #30363d;
            $gold: #efd9aa;
            */
            body {
                margin: 0;
            }
            .wrapper {
                height: 100vh;
                display: flex;
                background-color: #798899;
            }
            #left {
                float: left;
                width: 80%;
            }
            #right {
                float: right;
                width: 20%;
            }
            #main { 
                display: block; 
                height: 100vh;
            }
            #port, #blog {
                display: none;
                height: 100vh;
            }
            .nav {
                /* Navigation bar */
                font-family: IBM Plex Mono, monospace;
                background-color: #30363d;
                height: 100vh;
                display: flex;
                flex-wrap: wrap;
                justify-content: space-evenly;
                align-items: center;
                text-align: center;
            }
            #links, #social, #copy {
                width: 100%;
            }
            #links a {
                display: block;
                padding: 10% 0 10% 0;
                color: #efd9aa;
                background-color: inherit;
                text-transform: uppercase;
                text-decoration: none;
                transition: ease all .3s;
            }
            #links a:hover {
                color: #30363d;
                background-color: #efd9aa;
            }
            #social a {
                text-decoration: none;
                color: #798899;
            }
            #social a:hover {
                color: #556270;
            }
            #social a img {
                max-width: 20%;
            }
            #copy {
                font-size: .75em;
                color: #798899;
            }           
        </style>
	</head>
	<body>
        <div class="wrapper">
            <div id="left">
                <div id="main">
                    Welcome!
                </div>
                <div id="port">
                    Portfolio
                </div>
                <div id="blog">
                    Blog
                </div>
            </div>
            <div id="right">
                <div class="nav">
                    
                    <div id="links">
                        <a href="#main" onclick="show('main')"><img/></a>
                        <a href="#port" onclick="show('port')">Portfolio</a>
                        <a href="#blog" onclick="show('blog')">Blog</a>
                    </div>
                    
                    <div id="social">
                        <a href="#gh"><i class="fab fa-github 1em"></i></a>
                        <a href="#li"><i class="fab fa-linkedin-in 1em"></i></a>
                    </div>
                    
                    <div id="copy">
                      &copy; 2019 Nathan Tompkins
                    </div>
                </div>
            </div>
        </div>
	</body>
    <script type="text/javascript">
        var thisDiv = document.getElementById("main");
        function show(divID) {
            var div = document.getElementById(divID);
            thisDiv.style.display = "none";
            div.style.display = "block";
            thisDiv = div;
        }
    </script>
</html>
