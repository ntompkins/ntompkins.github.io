<!doctype html>
<html>
  <head>
    <title>Boomerang Flight Project</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Roboto:400,400i,700,700i&display=swap" rel="stylesheet">
	<link href="css/style.css" rel="stylesheet"/>
	<link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
	</head>
  
  <body>
	<nav class="flex items-center justify-between flex-wrap bg-teal-500 p-6">
		<div class="flex items-center flex-shrink-0 text-white mr-6">
			<span class="font-semibold text-xl tracking-tight"> Boomerang</span>
		</div>
		<div class="block">
			<button class="flex items-center px-3 py-2 border rounded text-teal-200 border-teal-400 hover:text-white hover:border-white">
				Settings
			</button>
		</div>
	</nav>

	<div class="flex items-center justify-center">
		<div class="w-full max-w-lg">
			<form class="bg-white shadow-md rounded px-8 pb-8 mb-4">
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						PLANE MODEL
					</label>
					<select id="attr-plane-model" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
						<option value="cessna-172">
							Cessna 172
						</option>
						<option value="eclipse-550">
							Eclipse 550
						</option>
						<option value="icon-a5">
							Icon A5
						</option>
					</select>
				</div>
				
				<div class="mb-4">
					<button class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-r">
						MANUAL ENTRY
					</button>
				</div>
	
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						GROUND RUN
					</label>
					<input id="attr-ground-run" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="Meters">
				</div>
	
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						TAKEOFF SPEED
					</label>
					<input id="attr-takeoff-speed" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="km/h">
				</div>
	
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						GLIDE RATIO
					</label>
					<input id="attr-glide-ratio" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="65">
				</div>
	
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						IATA CODE
					</label>
					<input id="attr-iata" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="DFW">
				</div>

				<div class="mb-4">
					<button class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l">
						IATA LOOKUP
					</button>
				</div>
			
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						TEMPERATURE
					</label>
					<input id="attr-temp" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="Celsius">
				</div>
	
				<div class="mb-4">
					<label class="block text-gray-700 text-sm font-bold mb-2">
						AIR PRESSURE
					</label>
					<input id="attr-air-pressure" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" type="text" placeholder="mmHg">
				</div>

				<div class="mb-4">
					<button class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l">
						WEATHER
					</button>
				</div>
	
				<button onclick="formSubmit()" class = "bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type = "button">
					Continue
				</button>
			</form>	
		</div>		
	</div>
	<script src="js/svg.min.js"></script>
	<script type="text/javascript">

		// Draw random shapes
		function render() {
			var draw = SVG().addTo("#drawing").size(100,100);
			var shape = draw.polygon('0,0 100,50 50,100').attr({fill:'#f06'})
		}

		function formSubmit() {
			// Pull form data
			var model = document.getElementById("attr-plane-model").value;
			var ground_run = document.getElementById("attr-ground-run").value;
			var speed = document.getElementById("attr-takeoff-speed").value;
			var glide_ratio = document.getElementById("attr-glide-ratio").value;
			var iata = document.getElementById("attr-iata").value;
			var temp = document.getElementById("attr-temp").value;
			var pressure = document.getElementById("attr-air-pressure").value;

			// Concat JSON and return string
			console.log(`'attributes':{'model':'${model}','ground-run':'${ground_run}','speed':'${speed}','glide_ratio':'${glide_ratio}','iata':'${iata}','temp':'${temp}','pressure':'${pressure}'}`);

		}
	</script>
  </body>
</html>
