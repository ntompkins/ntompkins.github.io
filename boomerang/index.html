<!doctype html>
<html>
  <head>
    <title>Boomerang Flight Project</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Roboto:400,400i,700,700i&display=swap" rel="stylesheet">
	<link href="css/style.css" rel="stylesheet"/>
  </head>
  
  <body>
	<div class="navbar">
		<a id="title" href="/index.html">Boomerang</a>
		<a id="settings" href="#settings">Settings</a>
	</div>
	<div class="table">

		<!-- Plane Information -->
		<div class="table-block">
			<div class="table-block-header">Plane Model</div>
			<select id="attr-plane-model">
				<option value="cessna-172">
					Cessna 172
				</option>
				<option value="eclipse-550">
					Eclipse 550
				</option>
				<option value="icon-a5">
					Icon A5
				</option>
			</select>
		</div>

		<!-- Position Information -->
		<div class="table-block">
			<div class="table-block-header">
				Lattitude
			</div>
			<input id="attr-lat">

			<div class="table-block-header">
				Longitude
			</div>
			<input id="attr-long">
			<br>
			<a href="#coordinate-lookup">Coordinate Lookup</a>
		</div>

		<!-- Takeoff Information -->
		<div class="table-block">
			<div class="table-block-header">
				Drag Coefficient
			</div>
			<input id="attr-drag">

			<div class="table-block-header">
				Takeoff Speed
			</div>
			<input id="attr-takeoff-speed">
			
			<div class="table-block-header">
				Temperature
			</div>
			<input id="attr-temp">

			<div class="table-block-header">
				Air Density
			</div>
			<input id="attr-density">
			<br>
			<a href="#weather-lookup">Weather Lookup</a>
		</div>
		<div class="table-block">
			<div class="table-block-header">
				<button onclick="render()">Redraw</button>
			</div>
			<div id="drawing">

			</div>
		</div>
		<input onclick="formSubmit()" type="button" value="Submit">
	</div>
	<script src="js/svg.min.js"></script>
	<script type="text/javascript">

		// Draw random shapes
		function render() {
			var draw = SVG().addTo("#drawing").size(100,100);
			var shape = draw.polygon('0,0 100,50 50,100').attr({fill:'#f06'})
		}

		function formSubmit() {
			// Pull form data
			var model = document.getElementById("attr-plane-model").value;
			var lat = document.getElementById("attr-lat").value;
			var long = document.getElementById("attr-long").value;
			var drag = document.getElementById("attr-drag").value;
			var takeoff = document.getElementById("attr-takeoff-speed").value;
			var temp = document.getElementById("attr-temp").value;
			var density = document.getElementById("attr-density").value;

			// Concat JSON and return string
			console.log(`'attributes':{'model':'${model}',\r\n'lat':'${lat}',\r\n'long':'${long}',\r\n'drag':'${drag}',\r\n'takeoff':'${takeoff}',\r\n'temp':'${temp}',\r\n'density':'${density}'}`);

		}
	</script>
  </body>
</html>
