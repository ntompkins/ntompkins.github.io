<!doctype html>
<html>
  <head>
    <title>Boomerang Flight Project</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Roboto:400,400i,700,700i&display=swap" rel="stylesheet">
	<link href="css/style.css" rel="stylesheet"/>
	<link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
	</head>
  
  <body>
	<div class="navbar">
		<a id="title" href="index.html">Boomerang</a>
		<a id="settings" href="#settings">Settings</a>
	</div>
	<div class="table">

		<!-- Plane Information -->
		<div class="table-block">
			<div class="table-block-header">PLANE MODEL</div>
			<select id="attr-plane-model">
				<option value="cessna-172">
					Cessna 172
				</option>
				<option value="eclipse-550">
					Eclipse 550
				</option>
				<option value="icon-a5">
					Icon A5
				</option>
			</select>
		</div>

		<!-- Takeoff Information -->
		<div class="table-block">
			<div class="table-block-header">
				GROUND RUN
			</div>
			<input id="attr-ground-run" placeholder="Meters">

			<div class="table-block-header">
				TAKEOFF SPEED
			</div>
			<input id="attr-takeoff-speed" placeholder="km/h">

			<div class="table-block-header">
				GLIDE RATIO
			</div>
			<input id="attr-glide-ratio" placeholder="65">
		</div>

		<!-- Position Information -->
		<div class="table-block">
			<div class="table-block-header">
				IATA CODE
			</div>
			<input id="attr-iata" placeholder="DFW">
			<button href="#coordinate-lookup">IATA Lookup</button>
			<button href="#manual-coordiantes">Enter coordinates manually</button>
		</div>

		<div class="table-block">
			<div class="table-block-header">
				TEMPERATURE
			</div>
			<input id="attr-temp" placeholder="Celsius">
			<button href="#weather-lookup">Weather Lookup</button>

			<div class="table-block-header">
				AIR PRESSURE
			</div>
			<input id="attr-air-pressure" placeholder="inHg">
		</div>

		<div class="table-block">
			<div class="table-block-header">
				<button onclick="render()">Redraw</button>
			</div>
			<div id="drawing">
			</div>
		</div>
		<input onclick="formSubmit()" type="button" value="Submit">
	</div>
	<script src="js/svg.min.js"></script>
	<script type="text/javascript">

		// Draw random shapes
		function render() {
			var draw = SVG().addTo("#drawing").size(100,100);
			var shape = draw.polygon('0,0 100,50 50,100').attr({fill:'#f06'})
		}

		function formSubmit() {
			// Pull form data
			var model = document.getElementById("attr-plane-model").value;
			var ground_run = document.getElementById("attr-ground-run").value;
			var speed = document.getElementById("attr-takeoff-speed").value;
			var glide_ratio = document.getElementById("attr-glide-ratio").value;
			var iata = document.getElementById("attr-iata").value;
			var temp = document.getElementById("attr-temp").value;
			var pressure = document.getElementById("attr-air-pressure").value;

			// Concat JSON and return string
			console.log(`'attributes':{'model':'${model}','ground-run':'${ground_run}','speed':'${speed}','glide_ratio':'${glide_ratio}','iata':'${iata}','temp':'${temp}','pressure':'${pressure}'}`);

		}
	</script>
  </body>
</html>
